---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: {{ .Values.commonName }}
  name: {{ .Values.commonName | lower | replace "_" "-" }}-cj
  namespace: {{ .Values.namespace }}
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  successfulJobsHistoryLimit: 2
  schedule: "{{ .Values.schedule }}"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            workloadType: "user"
            cloud.google.com/gke-spot: "true" # SpotVMs
            iam.gke.io/gke-metadata-server-enabled: "true" # Workload Identity
          tolerations:
          - key: cloud.google.com/gke-spot
            operator: Equal
            value: "true"
            effect: NoSchedule
          - key: workloadType
            operator: Equal
            value: "user"
            effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - key: cloud.google.com/gke-spot
                    operator: In
                    values:
                    - "true"
          serviceAccountName: {{ .Values.kubernetesServiceAccount }}
          securityContext:
            runAsNonRoot: true
          restartPolicy: Never
          containers:
            - name: {{ .Values.commonName }}
              image: "{{ printf "%s/%s/%s/%s:%s@%s" .Values.registry.host .Values.registry.projectId .Values.registry.repoName .Values.image.path .Values.image.tag .Values.image.digest | lower}}"
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsUser: 1000
              resources:
                limits:
                  cpu: 500m
                  memory: 200Mi
                requests:
                  cpu: 30m
                  memory: 50Mi
              env:
              - name: DEBUG
                value: "{{ .Values.debug }}"
              - name: ARTIFACT_REGISTRY_HOSTNAME
                value: "{{ .Values.registry.host }}"
              - name: ARTIFACT_REGISTRY_PROJECT_ID
                value: "{{ .Values.registry.projectId }}"

{{- end -}}
{{- end -}}
{{- end }}
