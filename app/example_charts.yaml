#############################################################
#
# Helm Charts Sync
#
#############################################################

#
# List of registries that will require authentication
#
authenticatedRegistries:
  #
  authenticated-registry-1.org.com:
    usernameSecret: authenticated-registry-1-secret
    usernameSecretKey: username
    passwordSecret: authenticated-registry-1-secret
    passwordSecretKey: password
  #
  authenticated-registry-2.org.com:
    usernameSecret: authenticated-registry-2-secret
    usernameSecretKey: username
    passwordSecret: authenticated-registry-2-secret
    passwordSecretKey: password

#
# List of Helm Charts to be pulled from their sources
#  and then pushed to their destination in Artifact Registry
#
# IMPORTANT: Non-existing destination repositories will throw a non-fatal error
#            Other charts will still be pulled
#
charts:
- source: charts.jetstack.io/cert-manager/cert-manager
  destination: testrepo/cert-manager
  versions:
  - v1.14.2
  - latest
- source: unauthenticated-registry.my-org.com/some-chart
  destination: testrepo/private-registry-charts
  versions:
  - v1.14.2
  - latest
- source: authenticated-registry.my-org.com/some-repo/some-chart
  destination: testrepo/private-registry-charts
  versions:
  - 1.2.3
  - 4.5.6
  - latest
# example-non-existing destination repository
- source: charts.jetstack.io/cert-manager/cert-manager-approver-policy
  destination: non-existent-repository/cert-manager
  versions:
  - v0.12.1
